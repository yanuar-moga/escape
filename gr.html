<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Guru</title>

<style>
body{
    font-family:Segoe UI,Arial;
    margin:0;
    background:#f1f5f9;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h3{
    margin-top:0;
}

select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:15px;
    background:#f8fafc;
    padding:15px;
    border-radius:10px;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Pilih Nama Guru</h3>

<select id="nama">
<option value="">-- Pilih Nama --</option>
</select>

<button onclick="tampilkan()">Tampilkan</button>

<div class="result" id="hasil"></div>
</div>

</div>

<script>

const API="PASTE_URL_WEB_APP_DISINI";

let DATA=[];

/* LOAD DATA */
fetch(API)
.then(res=>res.json())
.then(data=>{

DATA=data;

let select=document.getElementById("nama");

data.forEach(d=>{
select.innerHTML += `<option value="${d.nama}">${d.nama}</option>`;
});

})
.catch(err=>{
alert("❌ Gagal load data");
console.error(err);
});

/* TAMPILKAN DATA */
function tampilkan(){

let nama=document.getElementById("nama").value;

if(!nama){
alert("⚠️ Pilih nama dulu!");
return;
}

let d=DATA.find(x=>x.nama===nama);

if(!d){
alert("❌ Data tidak ditemukan");
return;
}

document.getElementById("hasil").innerHTML = `
<b>Nama:</b> ${d.nama}<br>
<b>NIP:</b> ${d.nip}<br>
<b>Mapel:</b> ${d.mapel}<br>
<b>Jabatan:</b> ${d.jabatan}
`;

}

</script>

</body>
</html>
