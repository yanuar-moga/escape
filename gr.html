<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Guru</title>

<style>
body{
    font-family:Segoe UI;
    margin:0;
    background:#0f172a;
    color:#fff;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:linear-gradient(135deg,#1e293b,#0f172a);
    padding:20px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* FORM */
select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    font-size:14px;
}

select{
    background:#1e293b;
    color:#fff;
}

button{
    background:linear-gradient(135deg,#3b82f6,#22d3ee);
    color:#fff;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

/* RESULT */
.result{
    margin-top:20px;
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    animation:fade .4s ease;
}

.result h2{
    margin-top:0;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.item{
    background:#0f172a;
    padding:10px;
    border-radius:10px;
    font-size:13px;
}

.item b{
    display:block;
    font-size:11px;
    opacity:.7;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}

/* MOBILE */
@media(max-width:600px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h3>Pilih Nama Guru</h3>

<select id="nama">
<option value="">Loading...</option>
</select>

<button onclick="tampilkan()">Tampilkan</button>

<div id="hasil"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyGVSyKHcB7G2rLLGs3kvG45LvfkT1UtPAilcb4h0XUZgLwnlP1bffdbnJk5ldGP3CQnw/exec";

let DATA=[];

/* LOAD DATA */
fetch(API)
.then(res=>res.json())
.then(data=>{

    console.log("DATA:",data);

    DATA=data;

    let select=document.getElementById("nama");
    select.innerHTML='<option value="">-- Pilih Nama --</option>';

    data.forEach(d=>{
        let nama = d["NAMA"];
        if(nama){
            select.innerHTML+=`<option value="${nama}">${nama}</option>`;
        }
    });

})
.catch(err=>{
    alert("❌ Gagal load data");
    console.error(err);
});

/* AMAN VALUE */
const val = (v)=> v ? v : "-";

/* TAMPILKAN DATA */
function tampilkan(){

let nama=document.getElementById("nama").value;

if(!nama){
alert("Pilih nama dulu!");
return;
}

let d=DATA.find(x => x["NAMA"]===nama);

if(!d){
alert("Data tidak ditemukan");
return;
}

document.getElementById("hasil").innerHTML=`

<div class="result">

<h2>${val(d["NAMA"])}</h2>

<div class="grid">

<div class="item"><b>NIP</b>${val(d["NIP"])}</div>
<div class="item"><b>Mapel</b>${val(d["MAPEL"])}</div>

<div class="item"><b>Tgl Lahir</b>${val(d["Tgl Lahir"])}</div>
<div class="item"><b>Usia</b>${val(d["Usia"])}</div>

<div class="item"><b>Tgl Pengangkatan</b>${val(d["Tgl Pengangkatan"])}</div>
<div class="item"><b>Numerologi</b>${val(d["Numerologi"])}</div>

<div class="item"><b>Arti Numerologi</b>${val(d["Arti Angka Numerologi"])}</div>
<div class="item"><b>Zodiak</b>${val(d["Zodiak"])}</div>

<div class="item"><b>Bahasa Cinta</b>${val(d["Bahasa Cinta"])}</div>
<div class="item"><b>Karakter Kuat</b>${val(d["Karakter Kuat"])}</div>

<div class="item"><b>Angka Keberuntungan</b>${val(d["Angka Keberuntungan"])}</div>
<div class="item"><b>Watak Jawa</b>${val(d["Watak Jawa"])}</div>

<div class="item"><b>Shio</b>${val(d["Shio"])}</div>
<div class="item"><b>Elemen</b>${val(d["Elemen"])}</div>

<div class="item"><b>Kepribadian</b>${val(d["Kepribadian"])}</div>
<div class="item"><b>Indikasi Gaya</b>${val(d["Indikasi Gaya"])}</div>

<div class="item"><b>Kecocokan Tim</b>${val(d["Kecocokan Tim"])}</div>
<div class="item"><b>Gaya Kerja</b>${val(d["Gaya Kerja"])}</div>

<div class="item"><b>Potensi Karier</b>${val(d["Potensi Karier"])}</div>

</div>

</div>
`;

}

</script>

</body>
</html>
